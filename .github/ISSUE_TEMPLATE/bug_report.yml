name: Bug report
description: Report a problem with Nohrs
title: "[Bug] "
labels: ["bug", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to file a bug report. Please search
        [existing issues](https://github.com/noh-rs/nohrs/issues) first to avoid duplicates.

  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: A clear and concise description of the bug.
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Minimal steps that reliably trigger the bug.
      placeholder: |
        1. Run `cargo run --features gui --bin nohrs`
        2. Open ...
        3. See error
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      description: Include error messages, logs, or screenshots if available.
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: Nohrs version / commit
      description: Output of `nohrs --version`, or the git commit you built from.
    validations:
      required: true

  - type: dropdown
    id: os
    attributes:
      label: Operating system
      options:
        - macOS
        - Linux
        - Other (note in summary)
    validations:
      required: true

  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Rust toolchain (`rustc --version`), OS version, and anything else relevant.

  - type: checkboxes
    id: checks
    attributes:
      label: Checklist
      options:
        - label: I searched existing issues and this is not a duplicate.
          required: true
