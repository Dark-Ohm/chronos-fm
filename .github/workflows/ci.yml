name: CI

on:
  push:
    branches: [develop, main]
    paths-ignore:
      - "web/**"
      - "docs/**"
      - "**.md"
  pull_request:
    paths-ignore:
      - "web/**"
      - "docs/**"
      - "**.md"

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# Least privilege by default; the coverage job opts into `code-quality: write`.
permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"

jobs:
  fmt:
    name: fmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          components: rustfmt

      - name: Format
        run: cargo fmt --all --check

  # gpui renders with Metal/Blade and the GUI stack is only exercised on macOS.
  # Linux therefore lints/tests/builds the headless `default-members` subset
  # (nohrs-core / nohrs-models / nohrs-services without its `gui` feature), while
  # macOS covers the full workspace with `--all-features` (pulling in gpui). This
  # mirrors the `default-members` split documented in the workspace Cargo.toml.
  clippy:
    name: clippy (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            args: "--all-targets"
          - os: macos-latest
            args: "--workspace --all-targets --all-features"
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          components: clippy

      - name: Cache cargo artifacts
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1

      # `unwrap_used` / `expect_used` are enforced as warn-level workspace lints
      # (see [workspace.lints.clippy] in Cargo.toml), promoted to errors here by
      # `-D warnings`. Tests are exempt via clippy.toml.
      - name: Clippy
        run: cargo clippy ${{ matrix.args }} --locked -- -D warnings

  test:
    name: test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            args: ""
          - os: macos-latest
            args: "--workspace --all-features"
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable

      - name: Cache cargo artifacts
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1

      - name: Test
        run: cargo test ${{ matrix.args }} --locked

  build:
    name: build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # lib only (headless default-members)
          - os: ubuntu-latest
            args: ""
          # full workspace including the gpui-backed `nohrs` binary
          - os: macos-latest
            args: "--workspace"
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable

      - name: Cache cargo artifacts
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1

      - name: Build
        run: cargo build ${{ matrix.args }} --locked

  # `bans` / `licenses` / `sources` are the required gate. `advisories` runs as a
  # separate informational step (continue-on-error) so transitive advisories from
  # the gpui async stack are surfaced without blocking merge (see deny.toml).
  deny:
    name: cargo-deny
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Install cargo-deny
        uses: taiki-e/install-action@e49978b799e49ff429d162b7a30601a569ab6538 # v2.81.1
        with:
          tool: cargo-deny

      - name: cargo-deny (bans / licenses / sources)
        run: cargo deny check bans licenses sources

      - name: cargo-deny (advisories, informational)
        continue-on-error: true
        run: cargo deny check advisories

  # Coverage is informational during P1–P5 (targets: core 80% / overall 50%); it
  # never blocks merge (continue-on-error). Two jobs mirror the `test` matrix
  # split: `coverage-core` measures the headless `default-members` subset on
  # Linux ("core" tier), and `coverage-overall` runs `--workspace --all-features`
  # on macOS so gpui (Metal backend, no system libs needed) is instrumented too
  # ("overall" tier incl. the GUI crates). The `#[gpui::test]` suite runs
  # headlessly via `TestAppContext` on both. Each job feeds GitHub's native code
  # coverage (PR diff inline; requires Code Quality enabled in repo settings) and
  # uploads its browsable HTML report as a downloadable CI artifact.
  #
  # These are two explicit jobs rather than one matrix: matrix legs share a
  # single set of `outputs`, and GitHub keeps only the last leg's values
  # (last-writer-wins, not merged), so a matrix could not reliably surface both
  # tier rates to `coverage-report`. Separate jobs each expose a stable `rate`.
  coverage-core:
    name: coverage (core)
    runs-on: ubuntu-latest
    continue-on-error: true
    permissions:
      contents: read
      code-quality: write
    outputs:
      rate: ${{ steps.rate.outputs.rate }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
          fetch-depth: 0
          # Check out the PR head (not the synthetic merge commit) so coverage
          # line mapping matches GitHub's native diff annotations.
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          components: llvm-tools-preview
      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@e49978b799e49ff429d162b7a30601a569ab6538 # v2.81.1
        with:
          tool: cargo-llvm-cov
      - name: Cache cargo artifacts
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
      # Runs the tests under instrumentation. The HTML report reuses the profile
      # data collected here, so it does not re-run the tests.
      - name: Generate Cobertura XML
        run: cargo llvm-cov --locked --cobertura --output-path cobertura-core.xml
      - name: Generate HTML report
        run: cargo llvm-cov report --html --output-dir target/llvm-cov
      - name: Extract line rate
        id: rate
        shell: bash
        run: |
          rate=$(grep -o 'line-rate="[0-9.]*"' cobertura-core.xml | head -1 | grep -o '[0-9.]*' | head -1)
          pct=$(awk "BEGIN { printf \"%.2f\", ${rate:-0} * 100 }")
          echo "rate=${pct}" >> "$GITHUB_OUTPUT"
      # GitHub native code coverage (PR diff inline). Skipped for PRs from forks,
      # which cannot write coverage data.
      - name: Upload coverage to GitHub
        if: ${{ github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository }}
        uses: actions/upload-code-coverage@abb5995db9e0199b0e2bb9dbd136fce4cb1ec4d3 # v1
        with:
          file: cobertura-core.xml
          language: Rust
          label: code-coverage/core
      # Browsable line-by-line report. Download the artifact and open index.html.
      - name: Upload HTML report artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: coverage-html-core
          path: target/llvm-cov/html

  coverage-overall:
    name: coverage (overall)
    runs-on: macos-latest
    continue-on-error: true
    permissions:
      contents: read
      code-quality: write
    outputs:
      rate: ${{ steps.rate.outputs.rate }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
          fetch-depth: 0
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          components: llvm-tools-preview
      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@e49978b799e49ff429d162b7a30601a569ab6538 # v2.81.1
        with:
          tool: cargo-llvm-cov
      - name: Cache cargo artifacts
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
      # `--all-features` pulls in gpui (Metal backend on macOS); the GUI crates
      # are instrumented and `#[gpui::test]` runs headlessly via `TestAppContext`.
      - name: Generate Cobertura XML
        run: cargo llvm-cov --workspace --all-features --locked --cobertura --output-path cobertura-overall.xml
      # Pass the same scope so the HTML report covers the GUI crates too; `report`
      # only re-renders the profile data collected above (no rebuild/re-run).
      - name: Generate HTML report
        run: cargo llvm-cov report --workspace --all-features --html --output-dir target/llvm-cov
      - name: Extract line rate
        id: rate
        shell: bash
        run: |
          rate=$(grep -o 'line-rate="[0-9.]*"' cobertura-overall.xml | head -1 | grep -o '[0-9.]*' | head -1)
          pct=$(awk "BEGIN { printf \"%.2f\", ${rate:-0} * 100 }")
          echo "rate=${pct}" >> "$GITHUB_OUTPUT"
      - name: Upload coverage to GitHub
        if: ${{ github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository }}
        uses: actions/upload-code-coverage@abb5995db9e0199b0e2bb9dbd136fce4cb1ec4d3 # v1
        with:
          file: cobertura-overall.xml
          language: Rust
          label: code-coverage/overall
      - name: Upload HTML report artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: coverage-html-overall
          path: target/llvm-cov/html

  # Posts (or updates) a single PR comment reporting both tiers against their
  # targets. A dedicated job (rather than the coverage jobs themselves) avoids a
  # race on the shared comment. Reads each tier's line rate from its job output,
  # so it needs no artifact download. Skipped for fork PRs (read-only token).
  coverage-report:
    name: coverage report
    runs-on: ubuntu-latest
    needs: [coverage-core, coverage-overall]
    if: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository }}
    permissions:
      pull-requests: write
    steps:
      - name: Comment coverage summary on PR
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        env:
          CORE_RATE: ${{ needs.coverage-core.outputs.rate }}
          OVERALL_RATE: ${{ needs.coverage-overall.outputs.rate }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        with:
          script: |
            // `core`, `github`, `context` are injected by github-script; avoid
            // shadowing them (a `const core` redeclaration is a SyntaxError).
            const corePct = process.env.CORE_RATE || 'n/a';
            const overallPct = process.env.OVERALL_RATE || 'n/a';
            const marker = '<!-- coverage-report -->';
            const body = `${marker}\n`
              + `📊 **Coverage**\n\n`
              + `| Tier | Line coverage | Target |\n`
              + `| --- | --- | --- |\n`
              + `| Core (headless \`default-members\`) | ${corePct}% | 80% |\n`
              + `| Overall incl. GUI (\`--all-features\`) | ${overallPct}% | 50% |\n\n`
              + `[⬇️ HTML reports](${process.env.RUN_URL}) — download the `
              + `\`coverage-html-core\` / \`coverage-html-overall\` artifacts and open \`index.html\`.\n\n`
              + `> Informational during P1–P5. Does not block merge.`;
            const { data: comments } = await github.rest.issues.listComments({
              ...context.repo,
              issue_number: context.issue.number,
            });
            const existing = comments.find((c) => c.body && c.body.includes(marker));
            if (existing) {
              await github.rest.issues.updateComment({
                ...context.repo, comment_id: existing.id, body,
              });
            } else {
              await github.rest.issues.createComment({
                ...context.repo, issue_number: context.issue.number, body,
              });
            }
