# cargo-deny configuration — licenses, advisories, dependency bans, sources.
# Mirrors docs/testing.md §3. The CI `deny` job runs `cargo deny check`.

[advisories]
# In CI, `bans`/`licenses`/`sources` are the required gate; `advisories` runs as
# an informational (non-blocking) step — see .github/workflows/ci.yml. The gpui
# async stack pulls several crates with open advisories that we cannot fix until
# upstream bumps; surfacing them without blocking matches testing.md's
# "informational early" stance.
#
# testing.md §3 lists `vulnerability = "deny"`, but this cargo-deny version
# removed the per-severity `vulnerability`/`notice` lint-level keys: advisories
# of those kinds are always errors now, so the setting is implied (and would be
# rejected as an unknown field if written out).
db-urls = ["https://github.com/RustSec/advisory-db"]
# Only flag unmaintained crates we depend on directly; transitive ones from the
# gpui stack are out of our control.
unmaintained = "workspace"
yanked = "deny"
ignore = []

[licenses]
# Permissive licenses only. Extend deliberately (a new entry means a new license
# is now allowed across the whole dependency tree).
allow = [
  "MIT",
  "Apache-2.0",
  "Apache-2.0 WITH LLVM-exception",
  "BSD-2-Clause",
  "BSD-3-Clause",
  "ISC",
  "Zlib",
  "0BSD",
  "Unicode-3.0",
  "MPL-2.0",
  "CC0-1.0",
  # NCSA (University of Illinois/NCSA): OSI-approved permissive license, reached
  # via gpui → image → ravif → rav1e → libfuzzer-sys.
  "NCSA",
]
confidence-threshold = 0.93

[bans]
multiple-versions = "warn"
wildcards = "allow"
deny = [
  # rustls unification — no OpenSSL in the tree.
  { name = "openssl-sys" },
  # NOTE: testing.md §3 also bans tokio outside the WASI plugin-execution layer
  # (chronos-fm-plugin-host, P4+). The app-core tokio removal (ADR 0004 / #64, P2) is
  # done: no first-party (chronos-fm-*) crate depends on tokio directly any more.
  # tokio is still present transitively, however, because gpui pulls a full async
  # reqwest stack as a non-optional dependency
  # (gpui → gpui_http_client → zed-reqwest → hyper → h2 → tokio) — `cargo tree -i
  # tokio` roots only in that chain, never in a first-party crate. A hard
  # `{ name = "tokio" }` deny therefore still cannot be enforced: tokio's direct
  # parents in that chain (h2, hyper, hyper-util, tokio-rustls, tokio-socks, …)
  # cannot be cleanly expressed via the `wrappers` allowlist. Add the hard deny
  # once gpui's HTTP stack can be feature-gated off (or a tokio-free gpui ships).
]

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-git = []
