services:
  chronos-fm:
    build:
      context: ../..
      dockerfile: docker/ci/Dockerfile
    environment:
      - DISPLAY=:99
    ports:
      - "5999:5999"
    volumes:
      - ../..:/chronos-fm
      - ${HOME}/.cargo/registry:/root/.cargo/registry
      - chronos-fm-data:/root/.chronos-fm
    entrypoint: ["/bin/bash", "-lc", "Xtigervnc :99 -geometry 1280x800 -depth 24 -SecurityTypes None -rfbport 5999 >/tmp/vnc.log 2>&1 & sleep 1 && fvwm >/tmp/fvwm.log 2>&1 & sleep 1 && cargo build -p chronos-fm && exec cargo run -p chronos-fm"]

volumes:
  chronos-fm-data:
