services:
  chronos-fm:
    build:
      context: ../..
      dockerfile: docker/dev/Dockerfile
    environment:
      - DISPLAY
    volumes:
      - /tmp/.X11-unix:/tmp/.X11-unix:rw
      - ${XAUTHORITY:-/dev/null}:/root/.Xauthority:ro
      - ../..:/chronos-fm
      - ${HOME}/.cargo/registry:/root/.cargo/registry
    entrypoint: ["/bin/bash", "-lc", "cargo build -p chronos-fm && exec cargo run -p chronos-fm"]
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
